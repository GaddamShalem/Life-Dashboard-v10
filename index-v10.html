<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard V10 - Login</title><link rel="stylesheet" href="style-v10.css">

</head>
<body class="auth-page"><div class="auth-container">

    <div class="auth-card">

        <h1>Life Dashboard</h1>

        <p class="auth-subtitle">
            Login to continue
        </p>

        <form id="loginForm">

            <div class="input-group">
                <label>Email</label>

                <input
                    type="email"
                    id="loginEmail"
                    placeholder="Enter email"
                    required>
            </div>

            <div class="input-group">
                <label>Password</label>

                <input
                    type="password"
                    id="loginPassword"
                    placeholder="Enter password"
                    required>
            </div>

            <button
                type="submit"
                class="primary-btn">

                Login

            </button>

        </form>

        <p class="switch-page">

            Don't have an account?

            <a href="register-v10.html">
                Register
            </a>

        </p>

    </div>

</div>

<script src="app-v10.js"></script>

</body>
</html>
