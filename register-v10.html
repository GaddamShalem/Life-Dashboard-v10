<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Dashboard V10 - Register</title><link rel="stylesheet" href="style-v10.css">

</head>
<body class="auth-page"><div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <p class="auth-subtitle">
            Register to get started
        </p>

        <form id="registerForm">

            <div class="input-group">

                <label>Email</label>

                <input
                    type="email"
                    id="registerEmail"
                    placeholder="Enter email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="registerPassword"
                    placeholder="Create password"
                    required>

            </div>

            <button
                type="submit"
                class="primary-btn">

                Register

            </button>

        </form>

        <p class="switch-page">

            Already have an account?

            <a href="index-v10.html">
                Login
            </a>

        </p>

    </div>

</div>

<script src="app-v10.js"></script>

</body>
</html>
